<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Roguelite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../public/main.css">
    <link rel="stylesheet" media="screen and (orientation: landscape)" href="../public/desktop.css">
</head>
<body>
<div class="topbar">
    <div class="currenciesgame">
        <div class="gold">
            <p class="gold-text-game">Gold: 0🪙</p>
        </div>
        <div class="xp">
            <p class="xp-text-game">XP: 0⭐</p>
        </div>
        <p class="level-text-game">Level: 1 🚀</p>
    </div>
</div>
<div class="body-container">
    <div id="card-container">
        <div class="options">
            <div id="heart-holder" class="heart-container">
            </div>
            <div class="buttons" id="game-buttons">
                <button id="startGameButton" class="optionClass">Start Game</button>
                <button id="restartGameButton" class="hidden">Restart Game</button>
                <button id="returnToHomeButton" class="optionClass">Return Home</button>
            </div>
        </div>
        <div id="card-holder" class="card-grid">
        </div>
    </div>

    <div id="end-level-blurscreen" class="blurscreen hidden">
        <div id="outer-card-selector">
            <h2>Level complete!</h2>
            <h2>Pick a new card!</h2>
            <div id="level-complete-card-selector">

            </div>
            <h2 id="level-complete-card-explanation">Select a card to see what it will do.</h2>
            <button class="blurbutton" id="confirm-choice">Go to next level</button>
            <button class="blurbutton" id="end-game-button">End game</button>
        </div>
    </div>
    <div id="end-run-blurscreen" class="blurscreen hidden">
        <div id="end-run-screen">
            <h1>Game over!</h1>
            <h2 id="end-run-stats">You have earned: x Gold and x XP</h2>
            <h2 id="end-run-score">Gold + XP = x Score</h2>
            <div id="end-run-buttons">
                <button class="blurbutton" id="submit-score-button">Submit score</button>
                <button class="blurbutton" id="return-home-button">Back to Homepage</button>
                <button class="blurbutton" id="play-again-button">Play again</button>
            </div>
        </div>
    </div>

</div>
<script src="/scripts/eventbus.js"></script>
<script src="/scripts/networking.js"></script>
<script src="/scripts/data.js"></script>
<script src="/scripts/gold.js"></script>
<script src="/scripts/xp.js"></script>
<script src="/scripts/specialCardLogic.js"></script>
<script type="module" src="/scripts/cardDistributor.js"></script>
<script>
    const displaydata = loadStuff();
    document.getElementsByClassName("gold-text-game")[0].textContent = `Gold: ${Math.floor(displaydata.gold)}🪙`
    document.getElementsByClassName("xp-text-game")[0].textContent = `XP: ${Math.floor(displaydata.xp)}⭐`
    document.getElementsByClassName("level-text-game")[0].textContent = `Level: ${Math.floor(displaydata.level)} 🚀`
    document.documentElement.dataset.theme = loadStuff().theme || "light"
</script>
</body>
</html>
