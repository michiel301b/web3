<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Roguelite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../public/main.css">
    <link rel="stylesheet" media="screen and (orientation: landscape)" href="../public/desktop.css">
</head>
<body>
<div class="homepage-container" id="login-container">
    <h1 class="hometitle">Memory Roguelite</h1>
    <div class="login-form">
        <form id="loginForm">
            <input type="text" name="username" placeholder="Username" required>
            <input type="text" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="submit" value="Register/Log in">
        </form>
        <p class="hidden bad-login-entry" id="bad-login-entry">Username must be at least 3 characters.
        Email must contain @ symbol.
        Password must be at least 8 characters.</p>
    </div>
</div>

</body>
<script src="/scripts/networking.js"></script>
<script src="/scripts/login.js"></script>
<script src="/scripts/data.js"></script>
</html>
